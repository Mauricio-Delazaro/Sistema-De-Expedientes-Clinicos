<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Expedientes Clínicos</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .login-error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: var(--radius); padding: .6rem .75rem;
      font-size: .85rem; margin-bottom: 1rem; display: none;
    }
    .login-error.visible { display: block; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn:disabled .spinner { display: inline-block; }
    .btn:disabled .btn-label { display: none; }
  </style>
</head>
<body>
<div class="entry-page">
  <div class="entry-card">
    <div class="entry-logo">Sistema Clínico</div>
    <h1 class="entry-title">Expedientes Clínicos</h1>
    <p class="entry-sub">Ingresa tu ID de usuario para continuar.</p>

    <div id="errorMsg" class="login-error" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="idUsuario">ID de usuario</label>
        <input id="idUsuario" type="number" placeholder="Ej. 1" min="1" required>
      </div>
      <button id="submitBtn" type="submit" class="btn btn-primary" style="margin-top:.5rem">
        <span class="btn-label">Ingresar</span>
        <span class="spinner"></span>
      </button>
    </form>
  </div>
</div>

<script src="api.js"></script>
<script>
  (function () {
    const token = Token.get();
    const user = User.get();
    if (token && user) redirigirPorRol(user.rol);
  })();

  function redirigirPorRol(rol) {
    const destinos = {
      TERAPEUTA: 'terapeuta.html',
      SUPERVISOR: 'supervisor.html',
      ADMINISTRADOR: 'admin.html',
    };
    const pagina = destinos[rol];
    if (pagina) window.location.href = pagina;
  }

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  function mostrarError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');

    const idUsuario = parseInt(document.getElementById('idUsuario').value);
    if (!idUsuario) { mostrarError('Ingresa un ID válido.'); return; }

    btn.disabled = true;
    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idUsuario }),
      });

      if (res.status === 401) { mostrarError('ID de usuario no encontrado.'); return; }
      if (!res.ok) { mostrarError('Error del servidor. Intenta de nuevo.'); return; }

      const data = await res.json();
      Token.set(data.token);
      User.set({ id: String(data.idUsuario), nombre: data.nombre, rol: data.rol });
      redirigirPorRol(data.rol);
    } catch {
      mostrarError('No se pudo conectar con el servidor.');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
