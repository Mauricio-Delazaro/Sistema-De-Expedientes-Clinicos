spring.application.name=expedientes

# Base de datos PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://dpg-d7vv5ul0lvsc73883e4g-a.oregon-postgres.render.com:5432/expedientes_db}
spring.datasource.username=${DATABASE_USERNAME:expedientes_db_user}
spring.datasource.password=${DATABASE_PASSWORD:ITDjNavExgobdunp6Ol3m3rJSckWvCoo}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — Flyway gestiona el esquema, no Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# Jackson — fechas como strings ISO 8601, no como timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Servidor
server.port=${PORT:8080}
