server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expedientes_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:expedientes-clinicos-dev-secret-key-must-be-32-chars-min}
jwt.public-key=${JWT_PUBLIC_KEY:}

internal.secret=${INTERNAL_SECRET:internal-secret-change-in-prod}

spring.jackson.serialization.write-dates-as-timestamps=false
