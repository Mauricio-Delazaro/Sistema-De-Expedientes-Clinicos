services:

  db:
    image: postgres:16-alpine
    container_name: expedientes_db
    environment:
      POSTGRES_DB:       expedientes_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expedientes_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expedientes_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL:           jdbc:postgresql://db:5432/expedientes_db
      DB_USER:          postgres
      DB_PASSWORD:      ${DB_PASSWORD:-changeme}
      JWT_SECRET:       ${JWT_SECRET:-expedientes-clinicos-dev-secret-key-must-be-32-chars-min}
      INTERNAL_SECRET:  ${INTERNAL_SECRET:-internal-secret-change-in-prod}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
